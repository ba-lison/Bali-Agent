# Manifesto do time Bali-Agent.
# Fonte de verdade do time montado para o projeto.
versao_base: "2.1.0"
projeto: nome-do-projeto
modo: operate
criado_em: "AAAA-MM-DDTHH:MM:SS-03:00"
runtime_authority: "bali-runtime"

stack_detectada:
  - linguagem: exemplo-typescript
    framework: exemplo-next.js
    sinais: ["package.json"]

nao_mexer:
  - "exemplo: migrations legadas em db/legacy/"

subagents_policy:
  objetivo_master: "materializar subagentes reais em todo ambiente"
  role_play_permitido: false
  fallback_obrigatorio: "adapter-nativo-ou-bali-runtime"

time:
  core:
    - orchestrator
    - discovery
    - prd-writer
    - sdd-architect
    - planner
    - implementer
    - qa
    - security
    - reviewer
    - recruiter
    - memory-curator
    - docs
  product_spine:
    - discovery
    - prd-writer
    - sdd-architect
  espinha:
    - orchestrator
    - planner
    - reviewer
  base:
    - discovery
    - prd-writer
    - sdd-architect
  especialistas:
  project_fixed: []
  temporary_policy:
    max_per_task: 3
    promote_after_reuse_count: 3

model_policy:
  default: host-default
  classes:
    cheap-fast:
      fallback: host-default
    balanced:
      fallback: host-default
    strong-coding:
      fallback: host-default
    strong-reasoning:
      fallback: host-default
  agents:
    orchestrator:
      preferred: strong-reasoning
      fallback: host-default
    reviewer:
      preferred: strong-reasoning
      fallback: host-default
    implementer:
      preferred: strong-coding
      fallback: host-default

enforcement_adapters:
  - bali-runtime
  - claude-code
  - codex
  - opencode
  - cursor
  - antigravity
